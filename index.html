<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess | Premium Experience</title>
    <meta name="description" content="A premium, modern chess game experience built with HTML, CSS, and Javascript.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Grandmaster<span>Chess</span></h1>
            <div id="turn-indicator" class="turn-indicator white-turn">
                White's Turn
            </div>
        </header>

        <main>
            <div class="game-wrapper">
                <div class="board-sidebar left">
                    <div class="coordinate-labels numbers">
                        <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                    </div>
                </div>
                <div class="board-container">
                    <div id="chessboard" class="chessboard">
                        <!-- Squares will be generated by JS -->
                    </div>
                </div>
                <div class="board-sidebar bottom">
                    <div class="coordinate-labels letters">
                        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="status-panel">
                    <div class="player-info white">
                        <div class="avatar">W</div>
                        <div class="name">Player 1</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="player-info black">
                        <div class="avatar">B</div>
                        <div class="name" id="player2-name">Player 2</div>
                    </div>
                </div>
                
                <div class="mode-selector">
                    <label for="game-mode">Game Mode</label>
                    <select id="game-mode">
                        <option value="pvp">Player vs Player</option>
                        <option value="pvb">Player vs Bot (Black)</option>
                    </select>
                </div>

                <button id="reset-btn" class="btn-primary">New Game</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Grandmaster Chess. Premium Experience.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
